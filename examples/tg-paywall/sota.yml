# SotaJS Serverless Configuration

service: tg-paywall

provider:
  name: yandex
  runtime: nodejs18
  memorySize: 128
  timeout: 10s
  folderId: b1gg3n3v1rr41aqh30o9
  oauthToken: ${env:YC_OAUTH_TOKEN}

functions:
  bot:
    handler: dist/minimal-bot.js
    name: tg-paywall-bot
    entrypoint: index.handler
    environment:
      BOT_TOKEN: ${env:BOT_TOKEN}
